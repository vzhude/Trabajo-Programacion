<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Form</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="form-container">
        <form action="" class="login">
          <h1 class="login-title">Iniciar Sesion</h1>

            <label for="" class="login-label">Nombre y Apellido</label>
            <input type="text" class="login-user" placeholder="Ej: Juan Pepito">

            <label for="" class="login-label">Usuario</label>
            <input type="text" class="login-user" placeholder="Ej: Pepito123">

            <label for="" class="login-label">Contraseña</label>
            <input type="password" class="login-password" placeholder="*********">

            <label for="" class="login-label">Repetir Contraseña</label>
            <input type="password" class="login-password" placeholder="*********">

            <label for="" class="login-label">Fecha De Nacimiento</label>
            <input type="text" class="login-password" placeholder="DD/MM/AAAA">

            <button type="submit" class="login-button">Crear Cuenta</button>
        </form>
    </div>
</body>
</html>
